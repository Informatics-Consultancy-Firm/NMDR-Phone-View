<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMDR — Offline</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Roboto',Arial,sans-serif;background:linear-gradient(135deg,#2c6793,#1f4a6a);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;border-radius:18px;padding:38px 30px;text-align:center;max-width:400px;width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.35);border-top:5px solid #ffc107;}
  .icon{font-size:58px;margin-bottom:14px;}
  h1{color:#2c6793;font-size:21px;font-weight:700;margin-bottom:12px;}
  p{color:#556;font-size:14px;line-height:1.7;margin-bottom:26px;}
  .btn{background:#2c6793;color:#fff;border:none;padding:13px 34px;font-size:14px;font-weight:700;
    border-radius:30px;cursor:pointer;font-family:inherit;}
  .btn:active{transform:scale(.97);}
  .status{margin-top:18px;padding:11px 14px;background:#f0f5f9;border-radius:8px;font-size:12px;color:#6c7a89;}
  .status.online{background:#e6f4ec;color:#2c7a4a;}
  .note{margin-top:16px;font-size:11px;color:#aab;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>No internet connection right now. Pages you have already opened are available offline; live dashboards will load again when you reconnect.</p>
  <button class="btn" onclick="tryAgain()">Try again</button>
  <div class="status" id="status">Checking connection…</div>
  <div class="note">Sierra Leone · NMCP · NMDR Portal</div>
</div>
<script>
  function tryAgain(){ if(navigator.onLine){ location.href='./index.html'; }
    else{ var s=document.getElementById('status'); s.textContent='Still offline — check your network and try again.'; s.className='status'; } }
  addEventListener('online',function(){ var s=document.getElementById('status');
    s.textContent='Connection restored! Redirecting…'; s.className='status online';
    setTimeout(function(){ location.href='./index.html'; },1000); });
  document.getElementById('status').textContent = navigator.onLine
    ? 'Connection available — tap Try again.' : 'No connection detected.';
</script>
</body>
</html>
